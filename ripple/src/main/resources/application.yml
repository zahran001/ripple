spring:
  application:
    name: ripple
  threads:
    virtual:
      enabled: true   # Dispatch all MVC requests on virtual threads (Loom)
  datasource:
    url: jdbc:postgresql://localhost:5432/ripple
    username: ripple
    password: ripple
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.ripple: DEBUG
    root: INFO

ripple:
  probe:
    concurrency-limit: 50            # ceil(serviceCount × intervalMs / timeoutMs)
    default-interval-ms: 5000
    http-timeout-ms: 2000
    tcp-timeout-ms: 1000
    default-latency-threshold-ms: 500

  circuit-breaker:
    failure-threshold: 5             # consecutive failures before OPEN
    cooldown-ms: 30000               # OPEN → HALF_OPEN cooldown

  stream:
    data-dir: /tmp/ripple-chronicle  # Chronicle Queue storage directory
    alert-router-high-water-mark: 9223372036854775807   # Long.MAX_VALUE
    state-store-high-water-mark: 9223372036854775807    # Long.MAX_VALUE
    sse-high-water-mark: 100
    degradation-planner-high-water-mark: 1000
    backpressure-check-interval-ms: 100

  rate-limit:
    requests-per-second: 100
    max-burst: 200   # token ceiling — caps idle credit accumulation; default 2× sustained rate

  blast-radius:
    cascade-threshold: 0.5           # fraction of failed deps to trigger cascade
    degraded-score-multiplier: 0.5   # multiplier applied to DEGRADED service scores

  steady-state:
    default:
      probe-latency-p99-max-ms: 500
      circuit-breakers-all-closed: true
      subscriber-lag-max: 500

  alert:
    retry-initial-delay-ms: 1000
    retry-max-delay-ms: 60000
    retry-max-attempts: 5
    sinks: []   # Configured at runtime: pagerduty, slack, webhook

  ttl:
    eviction-interval-ms: 60000
    stale-threshold-ms: 120000
