version: "3.9"

services:

  # =====================================================================
  # PostgreSQL — event history, graph snapshot persistence
  # =====================================================================
  postgres:
    image: postgres:16-alpine
    container_name: ripple-postgres
    environment:
      POSTGRES_DB: ripple
      POSTGRES_USER: ripple
      POSTGRES_PASSWORD: ripple
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ripple -d ripple"]
      interval: 5s
      timeout: 5s
      retries: 10

  # =====================================================================
  # Redis — service health state cache, steady-state baselines
  # =====================================================================
  redis:
    image: redis:7-alpine
    container_name: ripple-redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # =====================================================================
  # Prometheus — scrapes /actuator/prometheus
  # =====================================================================
  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: ripple-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - ripple
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d

  # =====================================================================
  # Grafana — dashboards for probe latency, circuit states, subscriber lag
  # =====================================================================
  grafana:
    image: grafana/grafana:11.1.3
    container_name: ripple-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ripple
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/ripple.json
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # =====================================================================
  # Ripple application
  # =====================================================================
  ripple:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ripple-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ripple
      SPRING_DATASOURCE_USERNAME: ripple
      SPRING_DATASOURCE_PASSWORD: ripple
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      RIPPLE_STREAM_DATA_DIR: /tmp/ripple-chronicle
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  postgres_data:
